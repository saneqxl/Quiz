<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Dev Quiz 🚀</title>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff0080;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
            position: relative;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #q-text {
            font-size: 1.4rem;
            margin-bottom: 25px;
            line-height: 1.4;
            min-height: 60px;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-blue);
            color: white;
            padding: 18px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s all cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
            transform: scale(1.03);
        }

        .btn.correct-anim { background: #4CAF50 !important; border-color: #4CAF50; color: white; }
        .btn.wrong-anim { background: #f44336 !important; border-color: #f44336; color: white; }

        .meme-img {
            width: 100%;
            max-height: 280px;
            object-fit: contain;
            margin-top: 20px;
            border-radius: 15px;
            display: none;
            border: 2px solid var(--neon-pink);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #next-btn {
            background: linear-gradient(90deg, #ff0080, #ff8c00);
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 25px;
            display: none;
            box-shadow: 0 0 15px #ff0080;
        }

        .result-screen h2 { font-size: 2.5rem; color: var(--neon-blue); }
    </style>
</head>
<body>

<div class="container" id="quiz-container">
    <div id="game-ui">
        <h1 id="title">Level Up Quiz 👾</h1>
        <div id="q-text">Подгружаем код...</div>
        <div class="answers-grid" id="ans-box"></div>
        <center><img id="meme-pic" class="meme-img"></center>
        <button id="next-btn" class="btn">ПРОДОЛЖИТЬ ➔</button>
    </div>

    <div class="result-screen" id="res-ui" style="display:none;">
        <h2>FINAL SCORE</h2>
        <p id="final-score" style="font-size: 2rem; margin: 20px 0;"></p>
        <button class="btn" style="border-color: var(--neon-pink)" onclick="location.reload()">REBOOT SYSTEM</button>
    </div>
</div>

<script>
    const sCorrect = new Audio('correct.mp3');
    const sWrong = new Audio('wrong.mp3');

    const quizData = [
        { 
            q: "Что выведет console.log(typeof []) в JavaScript?", 
            a: ["'object'", "'array'", "'null'", "'undefined'"], 
            ok: "'object'", 
            mC: "https://i.ibb.co/Q3bnMVNg/b120e00c34bdcef1bc63e4bbf61f08b2.jpg", 
            mW: "https://i.ibb.co/nqvJKX96/5b920809473378aae3b6c81d99f222de.jpg" 
        },
        { 
            q: "Какая база данных считается реляционной (SQL)?", 
            a: ["PostgreSQL", "MongoDB", "Redis"], 
            ok: "PostgreSQL", 
            mC: "https://i.ibb.co/TMnPxH08/062244a274f14bac6a574aa70a210b55.jpg", 
            mW: "https://i.ibb.co/6RHWNFMZ/2537fd8775db439628db40822604cf4a.jpg" 
        },
        { 
            q: "Как расшифровывается API?", 
            a: ["Application Programming Interface", "Apple Protocol Internet", "Advanced Program Install", "All Private Info"], 
            ok: "Application Programming Interface", 
            mC: "https://i.ibb.co/bZn0mPf/b7310eccd9b10909f2a14c5df99009d3.jpg", 
            mW: "https://i.ibb.co/0pkLPsNW/c759c02d64bd2e465250e35733d07082.jpg" 
        },
        { 
            q: "Git — это...", 
            a: ["Система контроля версий", "Язык программирования", "Среда разработки", "Хостинг сайтов"], 
            ok: "Система контроля версий", 
            mC: "https://i.ibb.co/d04LhG1W/7f07a7c3eb602bc4a99d9ea4d22f38a0.jpg", 
            mW: "https://i.ibb.co/Z1k6kWrF/2229299b41dcff3cb2f627672e9374a8.jpg" 
        },
        { 
            q: "Что такое 'Frontend'?", 
            a: ["То, что видит пользователь", "Работа с сервером", "Разработка ядер процессора"], 
            ok: "То, что видит пользователь", 
            mC: "https://i.ibb.co/rVp8mFg/b8fa2036e07be399b7a86791902c919e.jpg", 
            mW: "https://i.ibb.co/WpHhyPXf/b7debdf6e346b9619ec821380408dd13.jpg" 
        },
        { 
            q: "Какой цикл выполнится хотя бы один раз?", 
            a: ["do...while", "for", "while"], 
            ok: "do...while", 
            mC: "https://i.ibb.co/4w0NSjmP/15c60e12d6140c98731423a283303575.jpg", 
            mW: "https://i.ibb.co/ym4M1rLc/e0507bbd915b36e74b4233613d54f80f.gif" 
        },
        { 
            q: "Как в CSS выбрать элемент с id='box'?", 
            a: ["#box", ".box", "*box", "box!"], 
            ok: "#box", 
            mC: "https://i.ibb.co/YTw2X4FN/e43cfe173ed2a556d7c6eaace45754cd.jpg", 
            mW: "https://i.ibb.co/bRsgvw2L/2593af15c04f2c0cc26e7c9efa188c7b.jpg" 
        },
        { 
            q: "На каком языке пишут под iOS?", 
            a: ["Swift", "C#", "Kotlin", "PHP"], 
            ok: "Swift", 
            mC: "https://i.ibb.co/5xCXp3mk/40a06494a9d4528d2f6cddf967bd9ff8.jpg", 
            mW: "https://i.ibb.co/cpZzjT7/cf1a1a190fc521a534687e6d0ccb9bf6.jpg" 
        },
        { 
            q: "Что означает 404 ошибка?", 
            a: ["Страница не найдена", "Сервер упал", "Доступ запрещен", "У вас нет интернета"], 
            ok: "Страница не найдена", 
            mC: "https://i.ibb.co/spGsBhm5/dfcf944ce161be48376b49a7bd84eff5.jpg", 
            mW: "https://i.ibb.co/BHPwnvK8/072531631eafbf66ff837e4404313669.jpg" 
        },
        { 
            q: "Кто создал Linux?", 
            a: ["Линус Торвальдс", "Билл Гейтс", "Стив Джобс", "Марк Цукерберг"], 
            ok: "Линус Торвальдс", 
            mC: "https://i.ibb.co/GfmCMHdv/b6deb519ad7697ea88d3f36b08df5aa1.jpg", 
            mW: "https://i.ibb.co/sp8v97fs/f761d08b2a4d5ef21a9f733231322b0e.jpg" 
        }
    ];

    let current = 0;
    let score = 0;

    function renderQuestion() {
        const q = quizData[current];
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('ans-box');
        box.innerHTML = "";
        
        // Перемешиваем ответы
        const shuffledAnswers = [...q.a].sort(() => Math.random() - 0.5);

        shuffledAnswers.forEach(text => {
            const b = document.createElement('button');
            b.innerText = text;
            b.classList.add('btn');
            b.onclick = () => check(text, b);
            box.appendChild(b);
        });

        document.getElementById('meme-pic').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function check(selectedText, clickedBtn) {
        const q = quizData[current];
        const meme = document.getElementById('meme-pic');
        const allBtns = document.querySelectorAll('.btn');
        
        allBtns.forEach(b => b.disabled = true);
        meme.style.display = "block";
        
        if(selectedText === q.ok) {
            score++;
            sCorrect.play().catch(()=>{});
            clickedBtn.classList.add('correct-anim');
            meme.src = q.mC;
        } else {
            sWrong.play().catch(()=>{});
            clickedBtn.classList.add('wrong-anim');
            meme.src = q.mW;
            // Подсвечиваем правильный для обучения
            allBtns.forEach(b => { if(b.innerText === q.ok) b.classList.add('correct-anim'); });
        }

        if(current < quizData.length - 1) {
            document.getElementById('next-btn').style.display = "inline-block";
        } else {
            setTimeout(finish, 2500);
        }
    }

    document.getElementById('next-btn').onclick = () => {
        current++;
        renderQuestion();
    }

    function finish() {
        document.getElementById('game-ui').style.display = "none";
        document.getElementById('res-ui').style.display = "block";
        document.getElementById('final-score').innerText = score + " / " + quizData.length;
    }

    renderQuestion();
</script>
</body>
</html>
