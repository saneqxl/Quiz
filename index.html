<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Meme Quiz: Final Edition 🚀</title>
    <style>
        :root {
            --accent: #00d2ff;
            --pink: #ff0080;
            --bg: #0b0e14;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(10px);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .progress { font-size: 0.9rem; color: var(--accent); margin-bottom: 10px; }
        h2 { font-size: 1.3rem; margin-bottom: 20px; min-height: 50px; }

        .ans-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent);
            color: white;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn:hover:not(:disabled) { background: var(--accent); color: #000; }
        
        /* Цвета ответов */
        .correct { background: #2ecc71 !important; border-color: #2ecc71 !important; color: white !important; }
        .wrong { background: #e74c3c !important; border-color: #e74c3c !important; color: white !important; }

        /* Мемы */
        .meme-wrap { margin-top: 15px; height: 200px; display: none; }
        .meme-img { width: 100%; height: 100%; object-fit: contain; border-radius: 10px; border: 1px solid var(--pink); }

        /* Кнопка "Дальше" - теперь она видна, но заблокирована до ответа */
        #next-btn {
            background: var(--pink);
            border: none;
            width: 100%;
            margin-top: 20px;
            font-weight: bold;
            color: white;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            opacity: 0.3; /* Тусклая, пока не ответишь */
            pointer-events: none; /* Нельзя нажать */
            transition: 0.3s;
        }

        #next-btn.active { opacity: 1; pointer-events: auto; box-shadow: 0 0 15px var(--pink); }

        .result-screen { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <div class="progress" id="progress">Вопрос 1 из 10</div>
        <h2 id="q-text">Загрузка...</h2>
        <div class="ans-grid" id="ans-box"></div>
        
        <div class="meme-wrap" id="meme-wrap">
            <img id="meme-pic" class="meme-img" src="">
        </div>

        <button id="next-btn">СЛЕДУЮЩИЙ ВОПРОС ➔</button>
    </div>

    <div id="res-ui" class="result-screen">
        <h1>ТЕСТ ЗАВЕРШЕН</h1>
        <p id="score-text" style="font-size: 2rem;"></p>
        <button class="btn" onclick="location.reload()" style="width:100%">ПРОЙТИ ЕЩЕ РАЗ</button>
    </div>
</div>

<script>
    const sWin = new Audio('correct.mp3');
    const sFail = new Audio('wrong.mp3');

    const data = [
        { q: "Что выведет typeof [] в JS?", a: ["'object'", "'array'", "'list'"], ok: "'object'", mc: "https://i.ibb.co/Q3bnMVNg/b120e00c34bdcef1bc63e4bbf61f08b2.jpg", mw: "https://i.ibb.co/nqvJKX96/5b920809473378aae3b6c81d99f222de.jpg" },
        { q: "Git - это...", a: ["Система контроля версий", "Язык", "Браузер"], ok: "Система контроля версий", mc: "https://i.ibb.co/TMnPxH08/062244a274f14bac6a574aa70a210b55.jpg", mw: "https://i.ibb.co/6RHWNFMZ/2537fd8775db439628db40822604cf4a.jpg" },
        { q: "Какой протокол шифрует данные?", a: ["HTTPS", "HTTP", "FTP"], ok: "HTTPS", mc: "https://i.ibb.co/bZn0mPf/b7310eccd9b10909f2a14c5df99009d3.jpg", mw: "https://i.ibb.co/0pkLPsNW/c759c02d64bd2e465250e35733d07082.jpg" },
        { q: "Что такое 'баг'?", a: ["Ошибка в коде", "Живое насекомое", "Фича"], ok: "Ошибка в коде", mc: "https://i.ibb.co/d04LhG1W/7f07a7c3eb602bc4a99d9ea4d22f38a0.jpg", mw: "https://i.ibb.co/Z1k6kWrF/2229299b41dcff3cb2f627672e9374a8.jpg" },
        { q: "Главный язык для ИИ?", a: ["Python", "PHP", "Pascal"], ok: "Python", mc: "https://i.ibb.co/rVp8mFg/b8fa2036e07be399b7a86791902c919e.jpg", mw: "https://i.ibb.co/WpHhyPXf/b7debdf6e346b9619ec821380408dd13.jpg" },
        { q: "Как выйти из Vim?", a: [":wq", "Ctrl+C", "Alt+F4"], ok: ":wq", mc: "https://i.ibb.co/4w0NSjmP/15c60e12d6140c98731423a283303575.jpg", mw: "https://i.ibb.co/ym4M1rLc/e0507bbd915b36e74b4233613d54f80f.gif" },
        { q: "SQL используется для...", a: ["Баз данных", "Стилей сайтов", "Монтажа видео"], ok: "Баз данных", mc: "https://i.ibb.co/YTw2X4FN/e43cfe173ed2a556d7c6eaace45754cd.jpg", mw: "https://i.ibb.co/bRsgvw2L/2593af15c04f2c0cc26e7c9efa188c7b.jpg" },
        { q: "Что такое API?", a: ["Интерфейс программ", "Тип процессора", "Марка монитора"], ok: "Интерфейс программ", mc: "https://i.ibb.co/5xCXp3mk/40a06494a9d4528d2f6cddf967bd9ff8.jpg", mw: "https://i.ibb.co/cpZzjT7/cf1a1a190fc521a534687e6d0ccb9bf6.jpg" },
        { q: "Основатель Linux?", a: ["Линус Торвальдс", "Билл Гейтс", "Стив Джобс"], ok: "Линус Торвальдс", mc: "https://i.ibb.co/spGsBhm5/dfcf944ce161be48376b49a7bd84eff5.jpg", mw: "https://i.ibb.co/BHPwnvK8/072531631eafbf66ff837e4404313669.jpg" },
        { q: "1 Гб - это сколько Мб?", a: ["1024", "1000", "512"], ok: "1024", mc: "https://i.ibb.co/GfmCMHdv/b6deb519ad7697ea88d3f36b08df5aa1.jpg", mw: "https://i.ibb.co/sp8v97fs/f761d08b2a4d5ef21a9f733231322b0e.jpg" }
    ];

    let cur = 0; let score = 0;

    function render() {
        const q = data[cur];
        document.getElementById('progress').innerText = `Вопрос ${cur + 1} из ${data.length}`;
        document.getElementById('q-text').innerText = q.q;
        
        const box = document.getElementById('ans-box');
        box.innerHTML = "";
        
        // Перемешиваем ответы
        const shuffled = [...q.a].sort(() => Math.random() - 0.5);

        shuffled.forEach(t => {
            const b = document.createElement('button');
            b.innerText = t;
            b.classList.add('btn');
            b.onclick = () => check(t, b);
            box.appendChild(b);
        });

        // Сброс мема и кнопки
        document.getElementById('meme-wrap').style.display = 'none';
        const nBtn = document.getElementById('next-btn');
        nBtn.classList.remove('active');
        nBtn.innerText = "ВЫБЕРИТЕ ОТВЕТ";
    }

    function check(val, btn) {
        const q = data[cur];
        const all = document.querySelectorAll('.btn');
        all.forEach(b => b.disabled = true); // Блокируем кнопки

        const wrap = document.getElementById('meme-wrap');
        const pic = document.getElementById('meme-pic');
        wrap.style.display = 'block';

        if(val === q.ok) {
            score++;
            btn.classList.add('correct');
            sWin.play().catch(()=>{});
            pic.src = q.mc;
        } else {
            btn.classList.add('wrong');
            sFail.play().catch(()=>{});
            pic.src = q.mw;
            // Подсветка правильного
            all.forEach(b => { if(b.innerText === q.ok) b.classList.add('correct'); });
        }

        // Активируем кнопку "Дальше"
        const nBtn = document.getElementById('next-btn');
        nBtn.classList.add('active');
        nBtn.innerText = (cur === data.length - 1) ? "ПОСМОТРЕТЬ РЕЗУЛЬТАТ" : "СЛЕДУЮЩИЙ ВОПРОС ➔";
    }

    document.getElementById('next-btn').onclick = () => {
        if(cur < data.length - 1) {
            cur++;
            render();
        } else {
            showResults();
        }
    };

    function showResults() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('res-ui').style.display = 'block';
        document.getElementById('score-text').innerText = `${score} / ${data.length}`;
    }

    render();
</script>
</body>
</html>
