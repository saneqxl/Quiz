<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Cyber Quiz 🐍</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #7000ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white;
            overflow-x: hidden;
        }

        /* Анимированные частицы на фоне (эффект глубины) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            z-index: -1;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            width: 95%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .header {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Прогресс-бар */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 30px;
        }
        #bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px var(--primary);
            border-radius: 10px;
            transition: 0.4s;
        }

        .question {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.3;
        }

        .ans-grid { display: grid; gap: 12px; }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 18px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .correct { background: #00ff88 !important; color: #000 !important; font-weight: bold; }
        .wrong { background: #ff3e3e !important; }

        /* Мемы */
        .meme-wrap { margin-top: 25px; height: 200px; display: none; }
        .meme-img { width: 100%; height: 100%; object-fit: contain; border-radius: 15px; border: 1px solid var(--primary); }

        #next-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            width: 100%;
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            color: white;
            font-weight: 900;
            cursor: pointer;
            display: none;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        /* Финальный экран */
        .xp-val { font-size: 4rem; font-weight: 900; color: var(--primary); margin: 10px 0; }
        .rank { font-size: 1.2rem; background: white; color: black; padding: 5px 20px; border-radius: 50px; font-weight: 900; }
    </style>
</head>
<body>

<div class="main-card">
    <div id="game">
        <div class="header" id="step-count">SYSTEM: LOADING...</div>
        <div class="progress-container"><div id="bar"></div></div>
        <div class="question" id="q-text">Подключение к серверу...</div>
        <div class="ans-grid" id="ans-box"></div>
        <div class="meme-wrap" id="meme-box"><img id="meme-pic" class="meme-img" src=""></div>
        <button id="next-btn">ПОДТВЕРДИТЬ ➔</button>
    </div>

    <div id="result" style="display:none;">
        <div class="header">MISSION COMPLETE</div>
        <div class="xp-val" id="total-xp">0 XP</div>
        <div class="rank" id="rank-tag">NOOB</div>
        <p id="stats" style="margin-top: 25px; opacity: 0.7;"></p>
        <button class="btn" style="width:100%; margin-top: 20px; border-color: var(--primary);" onclick="location.reload()">REBOOT SYSTEM</button>
    </div>
</div>

<script>
    const sWin = new Audio('correct.mp3');
    const sFail = new Audio('wrong.mp3');

    const quizData = [
        { q: "Как в Python вывести текст?", a: ["print()", "say()", "эй_комп_пиши()", "console.log()"], ok: "print()", mc: "https://i.ibb.co/Q3bnMVNg/b120e00c34bdcef1bc63e4bbf61f08b2.jpg", mw: "https://i.ibb.co/nqvJKX96/5b920809473378aae3b6c81d99f222de.jpg" },
        { q: "Что такое Python?", a: ["Язык программирования", "Вид опасной шаурмы", "Приложение для фитнеса", "Марка кроссовок"], ok: "Язык программирования", mc: "https://i.ibb.co/TMnPxH08/062244a274f14bac6a574aa70a210b55.jpg", mw: "https://i.ibb.co/6RHWNFMZ/2537fd8775db439628db40822604cf4a.jpg" },
        { q: "Зачем нужны отступы в коде?", a: ["Это обязательная структура", "Чтобы было место для слез", "Для красоты", "Просто так"], ok: "Это обязательная структура", mc: "https://i.ibb.co/bZn0mPf/b7310eccd9b10909f2a14c5df99009d3.jpg", mw: "https://i.ibb.co/0pkLPsNW/c759c02d64bd2e465250e35733d07082.jpg" },
        { q: "Как называется ошибка в коде?", a: ["Баг", "Фича", "Косяк", "Подарок"], ok: "Баг", mc: "https://i.ibb.co/d04LhG1W/7f07a7c3eb602bc4a99d9ea4d22f38a0.jpg", mw: "https://i.ibb.co/Z1k6kWrF/2229299b41dcff3cb2f627672e9374a8.jpg" },
        { q: "Что делает цикл 'while True'?", a: ["Работает вечно", "Ломает компьютер сразу", "Спрашивает разрешение", "Ничего"], ok: "Работает вечно", mc: "https://i.ibb.co/rVp8mFg/b8fa2036e07be399b7a86791902c919e.jpg", mw: "https://i.ibb.co/WpHhyPXf/b7debdf6e346b9619ec821380408dd13.jpg" },
        { q: "Кто создал Python?", a: ["Гвидо ван Россум", "Илон Маск", "Твоя кошка", "Марк Цукерберг"], ok: "Гвидо ван Россум", mc: "https://i.ibb.co/4w0NSjmP/15c60e12d6140c98731423a283303575.jpg", mw: "https://i.ibb.co/ym4M1rLc/e0507bbd915b36e74b4233613d54f80f.gif" },
        { q: "Как получить данные от юзера?", a: ["input()", "get_money()", "прием()", "scan()"], ok: "input()", mc: "https://i.ibb.co/YTw2X4FN/e43cfe173ed2a556d7c6eaace45754cd.jpg", mw: "https://i.ibb.co/bRsgvw2L/2593af15c04f2c0cc26e7c9efa188c7b.jpg" },
        { q: "Какое расширение у файлов Python?", a: [".py", ".python", ".txt", ".exe"], ok: ".py", mc: "https://i.ibb.co/5xCXp3mk/40a06494a9d4528d2f6cddf967bd9ff8.jpg", mw: "https://i.ibb.co/cpZzjT7/cf1a1a190fc521a534687e6d0ccb9bf6.jpg" },
        { q: "Что такое 'комментарий' в коде?", a: ["Текст для людей (не для ПК)", "Оскорбление юзера", "Скрытая реклама", "Вирус"], ok: "Текст для людей (не для ПК)", mc: "https://i.ibb.co/spGsBhm5/dfcf944ce161be48376b49a7bd84eff5.jpg", mw: "https://i.ibb.co/BHPwnvK8/072531631eafbf66ff837e4404313669.jpg" },
        { q: "1024 Гб - это...", a: ["1 Тб", "Очень много фоток", "100 Гб", "1 Пб"], ok: "1 Тб", mc: "https://i.ibb.co/GfmCMHdv/b6deb519ad7697ea88d3f36b08df5aa1.jpg", mw: "https://i.ibb.co/sp8v97fs/f761d08b2a4d5ef21a9f733231322b0e.jpg" }
    ];

    let currentStep = 0; let score = 0;

    function render() {
        const q = quizData[currentStep];
        document.getElementById('step-count').innerText = `STEP: ${currentStep + 1} / ${quizData.length}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('bar').style.width = (currentStep / quizData.length * 100) + "%";
        
        const box = document.getElementById('ans-box');
        box.innerHTML = "";
        
        const shuffled = [...q.a].sort(() => Math.random() - 0.5);
        shuffled.forEach(text => {
            const b = document.createElement('button');
            b.innerText = text; b.className = 'btn';
            b.onclick = () => check(text, b);
            box.appendChild(b);
        });

        document.getElementById('meme-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function check(val, btn) {
        const q = quizData[currentStep];
        const all = document.querySelectorAll('.btn');
        all.forEach(b => b.disabled = true);

        const pic = document.getElementById('meme-pic');
        document.getElementById('meme-box').style.display = 'block';

        if(val === q.ok) {
            score++; btn.classList.add('correct');
            sWin.play().catch(()=>{}); pic.src = q.mc;
        } else {
            btn.classList.add('wrong');
            sFail.play().catch(()=>{}); pic.src = q.mw;
            all.forEach(b => { if(b.innerText === q.ok) b.classList.add('correct'); });
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    document.getElementById('next-btn').onclick = () => {
        if(currentStep < quizData.length - 1) {
            currentStep++; render();
        } else {
            finish();
        }
    };

    function finish() {
        document.getElementById('game').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('bar').style.width = "100%";
        
        const xp = score * 100;
        document.getElementById('total-xp').innerText = xp + " XP";
        document.getElementById('stats').innerText = `Код проанализирован: ${score} из 10 верных попаданий.`;

        let rank = "NOOB";
        if(score >= 5) rank = "JUNIOR CODER";
        if(score >= 8) rank = "SENIOR PYTHONER";
        if(score == 10) rank = "CYBER GOD";
        document.getElementById('rank-tag').innerText = rank;
    }

    render();
</script>
</body>
</html>
